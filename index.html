<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vexvision 2026 | Coming Soon</title>
    <style>
        :root {
            --primary-glow: #8e44ad;
            --secondary-glow: #3498db;
            --bg-dark: #0b0813;
            --card-bg: rgba(255, 255, 255, 0.04);
            --text-light: #ffffff;
            --text-muted: #a4b0be;
            --vex-accent: #00d2d3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at center, #1b103a 0%, var(--bg-dark) 100%);
            color: var(--text-light);
            overflow-x: hidden;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(11, 8, 19, 0.85);
            backdrop-filter: blur(12px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(45deg, var(--vex-accent), #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        nav a {
            color: var(--text-light);
            text-decoration: none;
            margin-left: 25px;
            font-weight: 500;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--vex-accent);
        }

        /* Main Landing Layout */
        .hero {
            text-align: center;
            padding: 160px 20px 80px 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .status-badge {
            background: rgba(0, 210, 211, 0.15);
            color: var(--vex-accent);
            border: 1px solid var(--vex-accent);
            padding: 6px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            box-shadow: 0 0 15px rgba(0, 210, 211, 0.2);
        }

        .hero h1 {
            font-size: 5.5rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 8px;
            font-weight: 900;
            background: linear-gradient(to bottom, #ffffff, #b2bec3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(142, 68, 173, 0.6));
        }

        /* Animated Coming Soon Text */
        .coming-soon {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 30px;
            background: linear-gradient(90deg, #fff, var(--vex-accent), #a29bfe, #fff);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShine 4s linear infinite;
        }

        @keyframes gradientShine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Venue Spotlight Card */
        .venue-card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 40px;
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            gap: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .venue-icon {
            font-size: 2rem;
            background: linear-gradient(45deg, #ff7675, #fd79a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .venue-details {
            text-align: left;
        }

        .venue-title {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .venue-location {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Action Controls */
        .cta-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 15px 35px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
        }

        .btn-discord {
            background: linear-gradient(45deg, #5865F2, #7289DA);
            color: white;
            border: none;
            box-shadow: 0 0 20px rgba(88, 101, 242, 0.4);
        }

        .btn-discord:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(88, 101, 242, 0.7);
        }

        /* Footer Attribution */
        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            background: #06040a;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">VEXVISION</div>
        <nav>
            <a href="#">Overview</a>
            <a href="#">Venue</a>
            <a href="https://discord.gg/PE5ghAWX5t" target="_blank">Discord</a>
        </nav>
    </header>

    <main class="hero">
        <div class="status-badge">Production Phase</div>
        <h1>Vexvision</h1>
        <div class="coming-soon">Coming Soon</div>
        
        <div class="venue-card">
            <div class="venue-details">
                <div class="venue-title">Wiener Stadthalle</div>
                <div class="venue-location">Host Venue  • Vienna</div>
            </div>
        </div>

        <div class="cta-group">
            <a href="https://discord.gg/PE5ghAWX5t" target="_blank" class="btn btn-discord">Join Now!</a>
        </div>
    </main>

    <footer>
        &copy; 2026 Vexvision Production Team. All Rights Reserved. Built for the Roblox Community. Independent project unassociated with the EBU.
    </footer>
</body>
</html>
